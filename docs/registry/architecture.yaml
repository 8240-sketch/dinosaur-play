# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: inkgd_direct_story_cast
    status: active
    description: "Never cast load() directly to InkStory: `var story: InkStory = load(path)` — this fails at runtime. Must use InkResource as intermediary: `var res: InkResource = load(path); var story = InkStory.new(res.json, runtime)`"
    why: "inkgd v0.6.0 load() returns InkResource, not InkStory. Direct cast silently produces wrong type or null. Verified from inkgd source; not documented in official API docs."
    adr: docs/architecture/adr-0001-inkgd-runtime.md
    added: 2026-05-06

  - pattern: inkgd_is_story_complete
    status: active
    description: "Never reference `story.is_story_complete` — this property does NOT exist in inkgd v0.6.0. Use `!story.can_continue && story.current_choices.is_empty()` for chapter completion detection."
    why: "is_story_complete was inferred from older inkgd versions or documentation but is absent in godot4 branch v0.6.0. Any code using it will crash with 'invalid get index' on Android."
    adr: docs/architecture/adr-0001-inkgd-runtime.md
    added: 2026-05-06

  - pattern: tts_provider_autonomous_speaker
    status: active
    description: "TtsProvider must NOT implement speak()/cancel() methods or emit speech_completed/speech_failed signals. It is a passive request-builder + response-parser (Path A). TtsBridge owns all HTTP I/O, flow control, and signal emission."
    why: "Autonomous provider pattern requires TtsProvider to manage HTTPRequest Node — impossible if TtsProvider extends RefCounted. Path A (TtsBridge-owned HTTPRequest) is simpler, consistent with GDD, and avoids Node lifecycle complexity. Verified by Godot Specialist and TD review 2026-05-06."
    adr: docs/architecture/adr-0002-tts-provider.md
    added: 2026-05-06

  - pattern: audiostream_load_from_buffer
    status: active
    description: "Never call `AudioStreamWAV.load_from_buffer(bytes)` or `AudioStreamMP3.load_from_buffer(bytes)` — these methods do NOT exist in Godot 4.x. Use property assignment: `var s := AudioStreamMP3.new(); s.data = bytes` or `var s := AudioStreamWAV.new(); s.data = pcm_bytes`."
    why: "load_from_buffer() was inferred from Godot 3.x patterns or incorrect documentation. Godot 4.x uses .data property assignment. Any code calling load_from_buffer() will crash at runtime with 'invalid method'."
    adr: docs/architecture/adr-0002-tts-provider.md
    added: 2026-05-06

  - pattern: savesystem_direct_file_access
    status: active
    description: "No system except SaveSystem may call FileAccess.open() or DirAccess methods on user:// save files. All persistence must go through SaveSystem.load_profile() and SaveSystem.flush_profile(). ProfileManager is the only system that calls SaveSystem directly; VocabStore, VoiceRecorder, and InterruptHandler route through ProfileManager.flush()."
    why: "SaveSystem owns the atomic write protocol (.tmp + rename). Direct file access bypasses atomicity guarantees, schema version stamping, and .tmp recovery. Violations create silent data corruption on Android OS kill."
    adr: docs/architecture/adr-0004-save-system-atomic-write.md
    added: 2026-05-08


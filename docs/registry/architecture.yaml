# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: inkgd_story_loading
    status: active
    pattern: direct_call
    producer: StoryManager
    consumers: []
    adr: docs/architecture/adr-0001-inkgd-runtime.md
    description: "load() on .ink.json returns InkResource (not InkStory). Must use InkStory.new(res.json, runtime) constructor. Any code that casts load() directly to InkStory will fail."
    referenced_by:
      - docs/architecture/adr-0001-inkgd-runtime.md
      - design/gdd/story-manager.md
    added: 2026-05-06
    revised: ""

  - contract: tts_provider_http
    status: active
    pattern: direct_call
    producer: TtsBridge
    consumers:
      - TtsProvider (build_request_params / parse_response / classify_error)
    adr: docs/architecture/adr-0002-tts-provider.md
    description: "TtsBridge owns HTTPRequest node and drives all HTTP I/O. TtsProvider is a passive request-builder + response-parser (Path A). TtsProvider must NOT own or manage HTTPRequest nodes. TtsProvider emits no signals — TtsBridge emits speech_completed and tts_fallback_to_highlight."
    referenced_by:
      - docs/architecture/adr-0002-tts-provider.md
      - design/gdd/tts-bridge.md
    added: 2026-05-06
    revised: ""

  - contract: savesystem_flush_load
    status: active
    pattern: direct_call
    producer: SaveSystem
    consumers:
      - ProfileManager
      - VocabStore (via ProfileManager.flush())
      - VoiceRecorder (via ProfileManager.flush())
      - InterruptHandler (via ProfileManager.flush())
    adr: docs/architecture/adr-0004-save-system-atomic-write.md
    description: "SaveSystem.load_profile(index) -> Dictionary; SaveSystem.flush_profile(index, data) -> bool. Only ProfileManager calls SaveSystem directly. VocabStore, VoiceRecorder, and InterruptHandler route through ProfileManager.flush(). SaveSystem never receives direct calls from Feature-layer systems."
    referenced_by:
      - docs/architecture/adr-0004-save-system-atomic-write.md
      - docs/architecture/architecture.md
      - design/gdd/save-system.md
      - design/gdd/profile-manager.md
    added: 2026-05-08
    revised: ""


# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: ink_narrative_runtime
    status: active
    api: "inkgd v0.6.0 (godot4 branch) — InkResource + InkStory.new(res.json, runtime)"
    not: "InkPlayer node (conflicts with AutoLoad lifetime); custom JSON state machine (fallback only if Android gate R1 fires)"
    adr: docs/architecture/adr-0001-inkgd-runtime.md
    reason: "GDScript-native; standard Ink authoring toolchain (Inky IDE + inklecate); scales to Chapter 2+ without code changes"
    referenced_by:
      - docs/architecture/adr-0001-inkgd-runtime.md
      - design/gdd/story-manager.md
      - design/gdd/tag-dispatcher.md
    added: 2026-05-06
    revised: ""

  - purpose: tts_provider_interface
    status: active
    api: "@abstract class TtsProvider extends RefCounted — Path A: build_request_params(text, instruction) -> Dictionary; parse_response(body: PackedByteArray) -> AudioStream; classify_error(http_code: int) -> int; configure_credentials(api_key, endpoint); is_configured() -> bool"
    not: "Autonomous TtsProvider with speak/cancel/signals (requires Node, cannot use RefCounted); Resource-based provider config (behavioral differences require code not data)"
    adr: docs/architecture/adr-0002-tts-provider.md
    reason: "Path A: TtsBridge owns HTTPRequest, provider is passive data transformer. RefCounted = automatic lifecycle. @abstract = compile-time enforcement. No signals on provider = TtsBridge owns all flow control."
    referenced_by:
      - docs/architecture/adr-0002-tts-provider.md
      - design/gdd/tts-bridge.md
    added: 2026-05-06
    revised: ""

  - purpose: audiostream_construction_from_bytes
    status: active
    api: "AudioStreamMP3.new(); stream.data = bytes  OR  AudioStreamWAV.new(); stream.data = pcm_bytes (strip 44-byte header); stream.format = FORMAT_16_BITS; stream.mix_rate = 22050"
    not: "AudioStreamMP3.load_from_buffer() or AudioStreamWAV.load_from_buffer() — these methods do NOT exist in Godot 4.x"
    adr: docs/architecture/adr-0002-tts-provider.md
    reason: "Godot 4.x uses .data property assignment, not load_from_buffer(). Verified from engine reference. Any code calling load_from_buffer() will crash at runtime."
    referenced_by:
      - docs/architecture/adr-0002-tts-provider.md
      - design/gdd/tts-bridge.md
    added: 2026-05-06
    revised: ""

  - purpose: atomic_file_write
    status: active
    api: "FileAccess.open(.tmp, WRITE) → store_string(json) → close; DirAccess.open(user://) → rename(.tmp → .json); check store_string() bool return; check rename() != OK"
    not: "Direct write to .json (non-atomic on Android); ResourceSaver (non-atomic, no schema versioning); append-only journal (over-engineered for <1KB files)"
    adr: docs/architecture/adr-0004-save-system-atomic-write.md
    reason: "POSIX rename() on ext4/F2FS is atomic. .tmp + rename guarantees no partial writes on Android OS kill. Simple mental model; <2ms flush time for <1KB files."
    referenced_by:
      - docs/architecture/adr-0004-save-system-atomic-write.md
      - docs/architecture/architecture.md
      - design/gdd/save-system.md
    added: 2026-05-08
    revised: ""

